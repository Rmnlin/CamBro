{% extends 'base.html' %}
{% block title %}เข้าสู่ระบบ - TU Exchange{% endblock %}
{% block content %}
<div class="max-w-md mx-auto px-4 py-12">
    <div class="bg-white rounded-lg shadow p-8">
        <h1 class="text-2xl font-bold text-gray-900 mb-2">เข้าสู่ระบบ</h1>
        <p class="text-gray-500 text-sm mb-6">TU Exchange</p>

        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 px-4 py-3 rounded text-sm
                    {% if message.tags == 'error' %}bg-red-100 text-red-700 border border-red-300
                    {% else %}bg-green-100 text-green-700 border border-green-300{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อผู้ใช้</label>
                <input type="text" name="username" required
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-tu-red">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">รหัสผ่าน</label>
                <input type="password" name="password" required
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-tu-red">
            </div>
            <button type="submit"
                class="w-full bg-tu-red text-white py-2 rounded-lg font-semibold hover:bg-red-700">
                เข้าสู่ระบบ
            </button>
        </form>

        <p class="text-center text-sm text-gray-600 mt-4">
            ยังไม่มีบัญชี? <a href="{% url 'register' %}" class="text-tu-red font-medium hover:underline">สมัครสมาชิก</a>
        </p>
    </div>
</div>
{% endblock %}
