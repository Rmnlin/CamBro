{% extends 'base.html' %}
{% block title %}ลบสิ่งของ - CamBro{% endblock %}
{% block content %}
<div class="max-w-md mx-auto px-4 py-12">
    <div class="bg-white rounded-lg shadow p-6 text-center">
        <p class="text-4xl mb-4">🗑️</p>
        <h1 class="text-xl font-bold text-gray-900 mb-2">ยืนยันการลบ</h1>
        <p class="text-gray-600 mb-6">คุณต้องการลบ <strong>{{ item.title }}</strong> ใช่หรือไม่?</p>
        <div class="flex gap-3">
            <a href="{% url 'dashboard' %}"
                class="flex-1 text-center py-2 border rounded-lg text-gray-600 hover:bg-gray-50">
                ยกเลิก
            </a>
            <form method="post" class="flex-1">
                {% csrf_token %}
                <button type="submit"
                    class="w-full bg-red-600 text-white py-2 rounded-lg font-semibold hover:bg-red-700">
                    ลบ
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
