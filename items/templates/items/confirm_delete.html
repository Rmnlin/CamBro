{% extends 'base.html' %}
{% block title %}ลบสิ่งของ - CamBro{% endblock %}
{% block content %}
<div class="max-w-md mx-auto px-4 py-12">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 text-center">
        <p class="text-5xl mb-6">🗑️</p>
        <h1 class="text-2xl font-bold text-gray-900 mb-2">ยืนยันการลบ</h1>
        <p class="text-gray-600 mb-8">คุณต้องการลบ <strong>{{ item.title }}</strong> ใช่หรือไม่?</p>
        
        <div class="flex gap-3">
            <a href="{% url 'dashboard' %}"
                class="flex-1 py-3 border border-gray-200 rounded-xl text-gray-600 font-medium hover:bg-gray-50 transition text-center">
                ยกเลิก
            </a>
            
            <form method="post" class="flex-1">
                {% csrf_token %}
                <button type="submit" class="w-full py-3 bg-main-blue text-white rounded-xl font-bold hover:opacity-90 transition shadow-sm">
                    ยืนยันการลบ
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
