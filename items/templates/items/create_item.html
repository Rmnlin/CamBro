{% extends 'base.html' %}
{% block title %}โพสต์สิ่งของ - TU Exchange{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">โพสต์สิ่งของให้ยืม</h1>

    {% if messages %}
        {% for message in messages %}
            <div class="mb-4 px-4 py-3 rounded text-sm
                {% if message.tags == 'error' %}bg-red-100 text-red-700 border border-red-300
                {% else %}bg-green-100 text-green-700 border border-green-300{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="post" enctype="multipart/form-data" class="bg-white rounded-lg shadow p-6 space-y-5">
        {% csrf_token %}

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อสิ่งของ *</label>
            <input type="text" name="title" required
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-tu-red"
                placeholder="เช่น ตำรา Calculus I, เครื่องคิดเลข Casio">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">หมวดหมู่ *</label>
            <select name="category" required
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-tu-red">
                <option value="">-- เลือกหมวดหมู่ --</option>
                {% for category in categories %}
                    <option value="{{ category.category_id }}">{{ category.icon }} {{ category.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">รายละเอียด *</label>
            <textarea name="description" required rows="3"
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-tu-red"
                placeholder="อธิบายสภาพ ข้อมูลเพิ่มเติม..."></textarea>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">สภาพของ</label>
                <select name="condition"
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-tu-red">
                    <option value="new">ใหม่</option>
                    <option value="good" selected>ดี</option>
                    <option value="fair">พอใช้</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">วิทยาเขต</label>
                <select name="campus"
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-tu-red">
                    <option value="rangsit">รังสิต</option>
                    <option value="tha_prachan">ท่าพระจันทร์</option>
                    <option value="lampang">ลำปาง</option>
                </select>
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">จุดนัดรับ *</label>
            <input type="text" name="pickup_location" required
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-tu-red"
                placeholder="เช่น หน้าตึก SC, หอสมุดปรีดี">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">ค่าธรรมเนียม</label>
            <div class="flex gap-4 mb-3">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="radio" name="is_free" value="true" checked onchange="toggleDeposit(this)">
                    <span>ฟรี</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="radio" name="is_free" value="false" onchange="toggleDeposit(this)">
                    <span>ต้องวางมัดจำ</span>
                </label>
            </div>
            <div id="deposit-field" class="hidden">
                <input type="number" name="deposit_amount" min="0"
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-tu-red"
                    placeholder="จำนวนเงินมัดจำ (บาท)">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">ยืมได้สูงสุด (วัน)</label>
            <input type="number" name="max_days" value="7" min="1" max="90"
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-tu-red">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">รูปภาพ (ถ้ามี)</label>
            <input type="file" name="photo" accept="image/*"
                class="w-full px-4 py-2 border rounded-lg text-sm text-gray-600">
        </div>

        <button type="submit"
            class="w-full bg-tu-red text-white py-3 rounded-lg font-semibold hover:bg-red-700">
            โพสต์สิ่งของ
        </button>
    </form>
</div>

<script>
function toggleDeposit(el) {
    document.getElementById('deposit-field').classList.toggle('hidden', el.value === 'true');
}
</script>
{% endblock %}
