{% extends 'base.html' %}
{% block title %}ขอยืม {{ item.title }} - CamBro{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto px-4 py-8">
    <div class="bg-white rounded-lg shadow p-6">
        <h1 class="text-xl font-bold text-gray-900 mb-1">ขอยืมสิ่งของ</h1>
        <p class="text-gray-500 text-sm mb-6">{{ item.title }}</p>

        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 px-4 py-3 rounded text-sm bg-red-100 text-red-700 border border-red-300">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">วันที่เริ่มยืม</label>
                <input type="date" name="start_date" required
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-tu-red">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">วันที่คืน (สูงสุด {{ item.max_days }} วัน)</label>
                <input type="date" name="end_date" required
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-tu-red">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">ข้อความถึงเจ้าของ (ถ้ามี)</label>
                <textarea name="message" rows="3"
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-tu-red"
                    placeholder="แนะนำตัว หรือบอกรายละเอียดเพิ่มเติม..."></textarea>
            </div>
            <div class="flex gap-3">
                <a href="{% url 'item_detail' item.item_id %}"
                    class="flex-1 text-center py-2 border rounded-lg text-gray-600 hover:bg-gray-50">
                    ยกเลิก
                </a>
                <button type="submit"
                    class="flex-1 bg-tu-red text-white py-2 rounded-lg font-semibold hover:bg-red-700">
                    ส่งคำขอ
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
