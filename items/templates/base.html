<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CamBro{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'main-blue': '#81D4FA',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-md border-b">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <a href="/" class="text-2xl font-bold text-main-blue flex items-center gap-2">
                    <span>🎓</span> CamBro
                </a>
                <div class="flex gap-4 items-center">
                    <a href="/" class="text-gray-700 hover:text-tu-red">หน้าหลัก</a>
                    {% if user.is_authenticated %}
                        <a href="{% url 'create_item' %}" class="bg-main-blue text-white px-5 py-2 rounded-full shadow-sm hover:opacity-80">+ โพสต์ของ</a>
                        <a href="{% url 'dashboard' %}" class="text-gray-700 hover:text-tu-red">Dashboard</a>
                        <span class="text-gray-700 text-sm">สวัสดี, <strong>{{ user.username }}</strong></span>
                        <a href="{% url 'logout' %}" class="text-gray-600 hover:text-tu-red text-sm">ออกจากระบบ</a>
                    {% else %}
                        <a href="{% url 'login' %}" class="text-gray-700 hover:text-tu-red">เข้าสู่ระบบ</a>
                        <a href="{% url 'register' %}" class="bg-main-blue text-white px-5 py-2 rounded-full shadow-sm hover:opacity-80">สมัครสมาชิก</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>
    
    {% if messages %}
        <div class="max-w-7xl mx-auto px-4 py-4">
            {% for message in messages %}
                <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}
    
    <main>
        {% block content %}{% endblock %}
    </main>
    
</body>
</html>
